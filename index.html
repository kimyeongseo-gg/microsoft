<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft Netherlands — 2026 Study Visit</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #050e1f;
  font-family: 'Pretendard', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── VIDEO BG ─────────────────────── */
#bg-video {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
}

/* ── OVERLAY ─────────────────────── */
#overlay {
  position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(
    160deg,
    rgba(5, 14, 31, 0.82) 0%,
    rgba(5, 14, 31, 0.65) 50%,
    rgba(0, 40, 120, 0.45) 100%
  );
  animation: overlayIn 1.8s ease forwards;
}
@keyframes overlayIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ── CONTENT ─────────────────────── */
#content {
  position: fixed; inset: 0; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 40px 100px;
  text-align: center;
  gap: 0;
}

/* Microsoft label */
#label {
  font-size: clamp(14px, 1.4vw, 18px);
  font-weight: 500;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: #5B9BFF;
  margin-bottom: 20px;
  opacity: 0;
  transform: translateY(-24px);
  animation: slideDown 0.7s cubic-bezier(.22,1,.36,1) 0.6s forwards;
}

/* Netherlands title — each letter is a span */
#title {
  font-size: clamp(64px, 11vw, 152px);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -.04em;
  color: #fff;
  margin-bottom: 28px;
  display: flex; flex-wrap: wrap; justify-content: center;
}
#title .char {
  display: inline-block;
  opacity: 0;
  transform: translateY(-60px);
  animation: charDrop 0.6s cubic-bezier(.22,1,.36,1) forwards;
}

/* Tagline */
#tagline {
  font-size: clamp(15px, 1.5vw, 20px);
  font-weight: 400;
  color: rgba(255, 255, 255, 0.55);
  letter-spacing: .02em;
  line-height: 1.7;
  max-width: 480px;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.8s ease 2.1s forwards;
}

/* Start button */
#start-wrap {
  position: fixed;
  bottom: 48px; left: 0; right: 0;
  display: flex; justify-content: center;
  z-index: 2;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.8s ease 2.5s forwards;
}
#start-btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 44px;
  background: #0057FF;
  color: #fff;
  font-family: 'Pretendard', sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: .08em;
  border: none; border-radius: 50px;
  cursor: pointer;
  text-decoration: none;
  transition: background .2s, transform .2s, box-shadow .2s;
  box-shadow: 0 0 32px rgba(0, 87, 255, 0.4);
}
#start-btn:hover {
  background: #1a6dff;
  transform: translateY(-2px);
  box-shadow: 0 0 48px rgba(0, 87, 255, 0.6);
}
#start-btn:active { transform: translateY(0); }

#start-btn .arrow {
  display: inline-block;
  transition: transform .2s;
}
#start-btn:hover .arrow { transform: translateX(5px); }

/* ── TRANSITION OUT ───────────────── */
#curtain {
  position: fixed; inset: 0; z-index: 99;
  background: #050e1f;
  opacity: 0; pointer-events: none;
  transition: opacity 0.7s cubic-bezier(.4,0,.2,1);
}
#curtain.on { opacity: 1; pointer-events: all; }

/* ── KEYFRAMES ────────────────────── */
@keyframes slideDown {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes charDrop {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

/* ── BOTTOM GRADIENT ──────────────── */
#bottom-grad {
  position: fixed; bottom: 0; left: 0; right: 0; height: 180px;
  background: linear-gradient(to top, rgba(5,14,31,0.85) 0%, transparent 100%);
  z-index: 1; pointer-events: none;
}

/* ── LOGO MS (top-left) ───────────── */
#ms-logo {
  position: fixed; top: 28px; left: 36px; z-index: 3;
  display: flex; align-items: center; gap: 8px;
  opacity: 0;
  animation: slideDown 0.6s ease 0.3s forwards;
}
.logo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; width: 16px; height: 16px; }
.logo-grid span { border-radius: 1px; }
.lr{background:#F25022;} .lg{background:#7FBA00;} .lb{background:#00A4EF;} .ly{background:#FFB900;}
#ms-logo span.name {
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.5);
  letter-spacing: .06em;
}

/* year badge top-right */
#year-badge {
  position: fixed; top: 28px; right: 36px; z-index: 3;
  font-size: 12px; font-weight: 500; letter-spacing: .14em;
  color: rgba(255,255,255,0.3);
  opacity: 0;
  animation: slideDown 0.6s ease 0.3s forwards;
}
</style>
</head>
<body>

<!-- Background video -->
<video id="bg-video" autoplay muted loop playsinline>
  <source src="skyline.mp4" type="video/mp4">
</video>

<!-- Dark overlay -->
<div id="overlay"></div>
<div id="bottom-grad"></div>

<!-- Top UI -->
<div id="ms-logo">
  <div class="logo-grid"><span class="lr"></span><span class="lg"></span><span class="lb"></span><span class="ly"></span></div>
  <span class="name">Microsoft</span>
</div>
<div id="year-badge">2026 Study Visit</div>

<!-- Main content -->
<div id="content">
  <div id="label">Microsoft</div>
  <h1 id="title"></h1>
  <p id="tagline">유럽 클라우드 인프라의 심장부<br>AI · 환경 · 디지털 주권까지 해부한다</p>
</div>

<!-- Start button -->
<div id="start-wrap">
  <button id="start-btn" onclick="startPresentation()">
    Start <span class="arrow">→</span>
  </button>
</div>

<!-- Transition curtain -->
<div id="curtain"></div>

<script>
// Netherlands 글자 하나씩 떨어지는 애니메이션
const title = document.getElementById('title');
const word = 'Netherlands';
const baseDelay = 0.9; // seconds

word.split('').forEach((ch, i) => {
  const span = document.createElement('span');
  span.classList.add('char');
  span.textContent = ch;
  span.style.animationDelay = (baseDelay + i * 0.07) + 's';
  title.appendChild(span);
});

// Start 버튼 → slides.html로 페이드 전환
function startPresentation() {
  const curtain = document.getElementById('curtain');
  curtain.classList.add('on');
  setTimeout(() => {
    window.location.href = 'slides.html';
  }, 700);
}

// 스페이스바 / 엔터로도 시작
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    startPresentation();
  }
});
</script>
</body>
</html>
